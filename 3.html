*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c8922a;
  --gold-light: #f0c96b;
  --gold-pale: #f7e4a8;
  --deep: #070e1c;
  --mid: #0d1a35;
  --cream: #fef9ef;
  --soft: #e8d5a0;
}

html, body {
  height: 100%;
  background: radial-gradient(ellipse at 30% 0%, #162448 0%, #070e1c 65%);
  font-family: 'GurbaniAkhar', serif;
  min-height: 100vh;
  color: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 30%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 680px;
  padding: 24px 16px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 26px;
}

/* IK ONKAR — rendered via GurbaniAkhar font using "<>" ligature */
.symbol-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding-top: 16px;
}

.ik-onkar-char {
  font-family: 'GurbaniAkhar', serif;
  font-size: 9rem;
  line-height: 1.3;
  padding-top: 0.2em;
  overflow: visible;
  color: var(--gold);
  text-shadow:
    0 0 20px rgba(200,146,42,0.8),
    0 0 50px rgba(200,146,42,0.4),
    0 0 80px rgba(200,146,42,0.2);
  animation: glow-pulse 3s ease-in-out infinite;
  user-select: none;
  display: block;
}

@keyframes glow-pulse {
  0%, 100% {
    text-shadow: 0 0 20px rgba(200,146,42,0.8), 0 0 50px rgba(200,146,42,0.4);
  }
  50% {
    text-shadow: 0 0 30px rgba(240,201,107,1), 0 0 70px rgba(200,146,42,0.6), 0 0 100px rgba(200,146,42,0.3);
  }
}

.title-text {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1.1rem;
  color: var(--gold-pale);
  letter-spacing: 0.04em;
  text-align: center;
  text-shadow: 0 0 12px rgba(200,146,42,0.5);
}

.audio-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.audio-label {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}

audio {
  width: 100%;
  max-width: 420px;
}

.divider {
  width: 80%;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.5;
}

.card {
  width: 100%;
  background: linear-gradient(160deg, #152040 0%, #0d1a35 100%);
  border: 1px solid rgba(200,146,42,0.35);
  border-radius: 16px;
  padding: 0 0 28px;
  box-shadow:
    0 0 0 1px rgba(240,201,107,0.06),
    0 8px 40px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(240,201,107,0.12);
  position: relative;
  overflow: hidden;
  animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent 10%, var(--gold) 50%, transparent 90%);
}
.card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent 10%, rgba(200,146,42,0.4) 50%, transparent 90%);
}

.card .corner { position: absolute; width: 20px; height: 20px; }
.card .corner-tl { top: 6px; left: 8px; border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); opacity: 0.5; }
.card .corner-tr { top: 6px; right: 8px; border-top: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); opacity: 0.5; }
.card .corner-bl { bottom: 6px; left: 8px; border-bottom: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); opacity: 0.5; }
.card .corner-br { bottom: 6px; right: 8px; border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); opacity: 0.5; }

.slok-badge {
  background: linear-gradient(135deg, var(--gold), #a0721f);
  color: #070e1c;
  font-family: Georgia, serif;
  font-size: 0.7rem;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 0;
  text-align: center;
  width: 100%;
  border-radius: 16px 16px 0 0;
  margin-bottom: 20px;
}

.slok-lines {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.slok-line {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1.35rem;
  line-height: 2.0;
  text-align: center;
  color: var(--soft);
  text-shadow: 0 0 8px rgba(200,146,42,0.15);
}

.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  font-family: Georgia, serif;
  font-size: 0.88rem;
  padding: 11px 22px;
  border-radius: 30px;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold), #a0721f);
  color: #070e1c;
  font-weight: bold;
  box-shadow: 0 4px 16px rgba(200,146,42,0.35);
}
.btn-primary:hover {
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  box-shadow: 0 6px 22px rgba(200,146,42,0.5);
  transform: translateY(-1px);
}

.btn-secondary {
  background: rgba(200,146,42,0.08);
  color: var(--gold-light);
  border: 1px solid rgba(200,146,42,0.35);
}
.btn-secondary:hover {
  background: rgba(200,146,42,0.18);
  border-color: var(--gold);
  transform: translateY(-1px);
}

.counter {
  font-family: Georgia, serif;
  font-size: 0.75rem;
  color: rgba(200,146,42,0.55);
  letter-spacing: 1px;
}

.footer {
  font-family: 'GurbaniAkhar', serif;
  font-size: 0.95rem;
  color: rgba(200,146,42,0.35);
  text-align: center;
  margin-top: 8px;
}

@media (max-width: 480px) {
  .ik-onkar-char { font-size: 7rem; }
  .slok-line { font-size: 1.15rem; }
}

/* ── Bottom Tab Navigation ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #0a1628;
  border-top: 1px solid rgba(200,146,42,0.4);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 58px;
  z-index: 999;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  padding: 6px 2px;
  transition: background 0.2s;
  border-radius: 0;
}

.nav-tab:active {
  background: rgba(200,146,42,0.1);
}

.nav-icon {
  font-size: 1.25rem;
  line-height: 1;
  margin-bottom: 2px;
}

.nav-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.6rem;
  color: rgba(200,146,42,0.6);
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.nav-tab.active .nav-label,
.nav-tab.active .nav-icon {
  filter: brightness(1.6);
}

/* Spacer so content isn't hidden behind nav */
body { padding-bottom: 64px; }

</style>

let currentIndex = 0;

function showSlok(idx) {
  currentIndex = ((idx % sloks.length) + sloks.length) % sloks.length;
  const card = document.getElementById('slokCard');
  const badge = document.getElementById('slokBadge');
  const lines = document.getElementById('slokLines');
  const counter = document.getElementById('counter');

  const parser = new DOMParser();
  const doc = parser.parseFromString(sloks[currentIndex], 'text/html');

  const label = doc.querySelector('.section-label');
  badge.textContent = label
    ? label.textContent.replace('sloku', 'Slok').replace(' - ', ' - ').trim()

  const slokLines = doc.querySelectorAll('.slok-line');
  lines.innerHTML = '';
  slokLines.forEach(l => {

    lines.appendChild(div);

  card.offsetHeight;
  card.style.animation = 'card-in 0.5s cubic-bezier(0.22,1,0.36,1) both';

function randomSlok() {

function nextSlok() { showSlok(currentIndex + 1); }
function prevSlok() { showSlok(currentIndex - 1); }
