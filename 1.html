* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #c8922a;
  --deep-blue: #0a1628;
  --light-gold: #f0c96b;
  --cream: #fef9ef;
  --soft-white: #fffdf6;
}

body {
  background: radial-gradient(ellipse at top, #1a2e50 0%, #0a1628 60%);
  font-family: 'GurbaniAkhar', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--cream);
}

.top-bar {
  width: 100%;
  background: linear-gradient(to right, #0a1628, #1a3060, #0a1628);
  border-bottom: 2px solid var(--gold);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 20px rgba(200,146,42,0.3);
}

.top-title {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1.4rem;
  color: var(--light-gold);
  text-shadow: 0 0 20px rgba(240,201,107,0.5);
}

.num-circle {
  text-align: center;
}

.num-circle span {
  display: block;
  background: rgba(200,146,42,0.15);
  border: 1px solid var(--gold);
  border-radius: 50%;
  width: 50px; height: 50px;
  line-height: 50px;
