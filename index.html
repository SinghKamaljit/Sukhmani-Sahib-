<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukhmani Sahib</title>

<!-- PWA Meta Tags -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sukhmani">
<meta name="theme-color" content="#0a1628">
<meta name="msapplication-TileColor" content="#0a1628">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background: radial-gradient(ellipse at top, #1a2e50 0%, #0a1628 60%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: linear-gradient(160deg, #152040 0%, #0d1a35 100%);
  border: 1px solid rgba(200,146,42,0.35);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(240,201,107,0.1);
  padding: 30px 24px 24px;
  max-width: 520px;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent, #c8922a, transparent);
}

h1 {
  color: #f0c96b;
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 0 0 20px rgba(200,146,42,0.5);
  letter-spacing: 0.5px;
}

.subtitle {
  text-align: center;
  color: rgba(200,146,42,0.6);
  margin-bottom: 24px;
  font-size: 0.82rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.tab-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  text-decoration: none;
  color: #fef9ef;
  transition: all 0.25s ease;
  border: 1px solid rgba(200,146,42,0.2);
  min-height: 95px;
}

.tab:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  border-color: rgba(200,146,42,0.6);
  background: rgba(200,146,42,0.08);
}

.tab:active {
  transform: translateY(-1px);
}

.tab-icon {
  font-size: 1.7rem;
  margin-bottom: 7px;
}

.tab-title {
  font-weight: 600;
  font-size: 0.82rem;
  text-align: center;
  line-height: 1.3;
  color: #fef9ef;
}

.tab-sub {
  font-size: 0.68rem;
  color: rgba(200,146,42,0.65);
  margin-top: 4px;
  text-align: center;
}

/* Audio tab — same size as others, gold tint */
.tab.audio {
  background: rgba(200,146,42,0.07);
  border-color: rgba(200,146,42,0.35);
}

.tab.audio:hover {
  background: rgba(200,146,42,0.14);
  border-color: rgba(200,146,42,0.7);
}

.badge {
  display: inline-block;
  font-size: 0.52rem;
  padding: 2px 7px;
  border-radius: 8px;
  background: rgba(200,146,42,0.15);
  color: #c8922a;
  margin-top: 5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid rgba(200,146,42,0.3);
}

.tab.audio .badge {
  background: rgba(200,146,42,0.2);
  color: #f0c96b;
}

.footer {
  margin-top: 20px;
  text-align: center;
  font-size: 0.72rem;
  color: rgba(200,146,42,0.4);
  letter-spacing: 0.5px;
}

/* Install prompt */
.install-banner {
  display: none;
  background: linear-gradient(135deg, #c8922a, #a87220);
  color: #fff8e8;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 18px;
  text-align: center;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}

.install-banner:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 15px rgba(200,146,42,0.4);
}

@media (max-width: 400px) {
  .container { padding: 22px 16px 20px; }
  .tab { min-height: 82px; padding: 14px 10px; }
  .tab.audio { min-height: 70px; }
  h1 { font-size: 1.35rem; }
}
</style>
</head>
<body>
<div class="container">

  <div id="installBanner" class="install-banner">
    📲 Install Sukhmani Sahib App
  </div>

  <h1>📿 Sukhmani Sahib</h1>
  <p class="subtitle">Sacred Path of Peace</p>

  <div class="tab-grid">

    <a href="1.html" class="tab">
      <span class="tab-icon">ੴ</span>
      <span class="tab-title">Full Path</span>
      <span class="badge">24 Ashtpadis</span>
      <span class="tab-sub">Prev / Next</span>
    </a>

    <a href="2.html" class="tab">
      <span class="tab-icon">ੴ</span>
      <span class="tab-title">Random Ashtpadi</span>
      <span class="badge">Random</span>
      <span class="tab-sub">Shuffle</span>
    </a>

    <a href="3.html" class="tab">
      <span class="tab-icon">✨</span>
      <span class="tab-title">Sukhmani Slok</span>
      <span class="badge">24 Sloks</span>
      <span class="tab-sub">Random</span>
    </a>

    <a href="4.html" class="tab audio">
      <span class="tab-icon">🎵</span>
      <span class="tab-title">Audio Recitation</span>
      <span class="badge">MP3</span>
      <span class="tab-sub">Full Path</span>
    </a>

  </div>

  <div class="footer">🙏 Waheguru Ji Ka Khalsa, Waheguru Ji Ki Fateh</div>
</div>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}

// Handle App Install prompt
let deferredPrompt;
const installBanner = document.getElementById('installBanner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'block';
});

installBanner.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    console.log(`User choice: ${result.outcome}`);
    deferredPrompt = null;
    installBanner.style.display = 'none';
  }
});

window.addEventListener('appinstalled', () => {
  installBanner.style.display = 'none';
  console.log('App installed successfully!');
});
</script>
</body>
</html>
