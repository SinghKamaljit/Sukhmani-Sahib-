<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukhmani Sahib - Audio Recitation</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.container {
background: white;
border-radius: 20px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
padding: 40px;
max-width: 500px;
width: 100%;
text-align: center;
}

.back-btn {
display: inline-flex;
align-items: center;
gap: 8px;
background: #f7fafc;
color: #2d3748;
padding: 10px 20px;
border-radius: 10px;
text-decoration: none;
font-weight: 600;
font-size: 0.95rem;
transition: all 0.3s ease;
border: 2px solid transparent;
margin-bottom: 30px;
}

.back-btn:hover {
background: #edf2f7;
border-color: #667eea;
transform: translateX(-3px);
}

.icon-large {
font-size: 4rem;
margin-bottom: 15px;
display: block;
}

h1 {
color: #2d3748;
font-size: 1.8rem;
margin-bottom: 8px;
}

.subtitle {
color: #718096;
font-size: 0.95rem;
margin-bottom: 30px;
}

.audio-wrapper {
background: #f7fafc;
border-radius: 16px;
padding: 30px 20px;
margin-bottom: 20px;
}

audio {
width: 100%;
border-radius: 10px;
outline: none;
}

audio::-webkit-media-controls-panel {
background: #edf2f7;
}

.file-info {
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
font-size: 0.85rem;
color: #4a5568;
margin-top: 15px;
}

.file-info span {
background: #e2e8f0;
padding: 4px 12px;
border-radius: 20px;
}

.footer {
margin-top: 30px;
font-size: 0.8rem;
color: #a0aec0;
}

@media (max-width: 480px) {
.container {
padding: 25px 20px;
}

.icon-large {
font-size: 3rem;
}

h1 {
font-size: 1.4rem;
}
}

/* ── Bottom Tab Navigation ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #0a1628;
  border-top: 1px solid rgba(200,146,42,0.4);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 58px;
  z-index: 999;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  padding: 6px 2px;
  transition: background 0.2s;
  border-radius: 0;
}

.nav-tab:active {
  background: rgba(200,146,42,0.1);
}

.nav-icon {
  font-size: 1.25rem;
  line-height: 1;
  margin-bottom: 2px;
}

.nav-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.6rem;
  color: rgba(200,146,42,0.6);
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.nav-tab.active .nav-label,
.nav-tab.active .nav-icon {
  filter: brightness(1.6);
}

/* Spacer so content isn't hidden behind nav */
body { padding-bottom: 64px; }

</style>
</head>
<body>
<div class="container">
<!-- Back Button -->
<a href="index.html" class="back-btn">
← Back to Index
</a>

<!-- Audio Content -->
<span class="icon-large">🎵</span>
<h1>Audio Recitation</h1>
<p class="subtitle">Sukhmani Sahib Path</p>

<div class="audio-wrapper">
<audio controls>
<source src="1.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>
</div>

<div class="file-info">
<span>📁 MP3 Audio</span>
<span>⏱️ Full Path</span>
<span>🔊 Su_Sahib_audio</span>
</div>

<div class="footer">
🙏 Waheguru Ji Ka Khalsa, Waheguru Ji Ki Fateh
</div>
</div>
<!-- Bottom Tab Navigation -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-tab">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </a>
  <a href="1.html" class="nav-tab">
    <span class="nav-icon">📖</span>
    <span class="nav-label">Path</span>
  </a>
  <a href="2.html" class="nav-tab">
    <span class="nav-icon">🎲</span>
    <span class="nav-label">Random</span>
  </a>
  <a href="3.html" class="nav-tab">
    <span class="nav-icon">✨</span>
    <span class="nav-label">Slok</span>
  </a>
  <a href="4.html" class="nav-tab active">
    <span class="nav-icon">🎵</span>
    <span class="nav-label">Audio</span>
  </a>
</nav>

</body>
</html>
